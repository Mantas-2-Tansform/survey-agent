<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Survey Platform — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#0d0d12;
  --ink-2:#1a1a24;
  --ink-3:#252533;
  --wire:rgba(255,255,255,0.07);
  --wire-2:rgba(255,255,255,0.12);
  --fog:#6b6b8a;
  --mist:#9494b0;
  --snow:#e8e8f0;
  --white:#f5f5fa;
  --lime:#b8ff57;
  --lime-dim:rgba(184,255,87,0.1);
  --lime-glow:0 0 40px rgba(184,255,87,0.15);
  --cyan:#57d9ff;
  --rose:#ff6b8a;
  --r:10px;
}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--ink);
  color:var(--snow);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -10%,rgba(184,255,87,0.05) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 90% 90%,rgba(87,217,255,0.04) 0%,transparent 70%);
}
.card{
  background:var(--ink-2);
  border:1px solid var(--wire-2);
  border-radius:20px;
  padding:48px 40px;
  width:100%;max-width:420px;
  box-shadow:0 24px 64px rgba(0,0,0,0.5),var(--lime-glow);
  animation:fadeUp .4s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.brand{
  display:flex;align-items:center;gap:14px;
  margin-bottom:36px;
}
.brand-pip{
  width:44px;height:44px;border-radius:12px;
  background:var(--lime);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;color:var(--ink);flex-shrink:0;
}
.brand-name{
  font-family:'Syne',sans-serif;
  font-weight:800;font-size:20px;letter-spacing:-.3px;
}
.brand-name span{color:var(--lime);}
.brand-sub{font-size:12px;color:var(--fog);margin-top:2px;font-family:'DM Mono',monospace;}
h2{
  font-family:'Syne',sans-serif;
  font-weight:700;font-size:26px;letter-spacing:-.5px;
  margin-bottom:6px;
}
.subtitle{font-size:14px;color:var(--fog);margin-bottom:32px;}
label{
  display:block;font-size:13px;font-weight:500;
  color:var(--mist);margin-bottom:6px;
}
input{
  width:100%;background:var(--ink-3);border:1px solid var(--wire-2);
  border-radius:var(--r);padding:12px 16px;
  font-size:14px;color:var(--white);font-family:'DM Sans',sans-serif;
  outline:none;transition:border-color .2s,box-shadow .2s;
  margin-bottom:20px;
}
input:focus{border-color:var(--lime);box-shadow:0 0 0 3px rgba(184,255,87,0.1);}
input::placeholder{color:var(--fog);}
.btn{
  width:100%;padding:14px;border-radius:var(--r);border:none;
  background:var(--lime);color:var(--ink);
  font-family:'Syne',sans-serif;font-weight:700;font-size:15px;
  cursor:pointer;transition:opacity .2s,transform .1s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn:hover{opacity:.9;}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.error{
  background:rgba(255,107,138,0.1);border:1px solid rgba(255,107,138,0.3);
  border-radius:var(--r);padding:12px 16px;
  font-size:13px;color:var(--rose);
  margin-bottom:20px;display:none;
}
.spinner{
  width:18px;height:18px;border:2px solid rgba(13,13,18,.4);
  border-top-color:var(--ink);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="brand" style="flex-direction:column;align-items:flex-start;gap:10px;">
    <img src="/static/M2T_LOGO.png" alt="Logo" style="height:36px;width:auto;object-fit:contain;" onerror="this.style.display='none'"/>
    <div style="display:flex;align-items:center;gap:14px;">
      <div class="brand-pip">📊</div>
      <div>
        <div class="brand-name">Survey <span>Platform</span></div>
        <div class="brand-sub">Dynamic Campaign Engine</div>
      </div>
    </div>
  </div>
  <h2>Sign in</h2>
  <p class="subtitle">Access the campaign dashboard</p>
  <div class="error" id="errBox"></div>
  <label for="email">Email address</label>
  <input type="email" id="email" placeholder="admin@example.com" autocomplete="username"/>
  <label for="password">Password</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  <button class="btn" id="loginBtn" onclick="doLogin()">
    <span id="btnLabel">Sign in →</span>
  </button>
</div>

<script>
const API = window.location.origin;

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errBox   = document.getElementById('errBox');
  const btn      = document.getElementById('loginBtn');
  const label    = document.getElementById('btnLabel');

  errBox.style.display = 'none';
  if (!email || !password) {
    showError('Please enter your email and password.');
    return;
  }

  btn.disabled = true;
  label.innerHTML = '<span class="spinner"></span>';

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Login failed');

    // Store token and user info
    localStorage.setItem('token', data.access_token);
    localStorage.setItem('user', JSON.stringify({ id: data.user_id, name: data.name, role: data.role }));

    // Redirect based on role
    window.location.href = data.role === 'admin' ? '/admin.html' : '/client.html';
  } catch (e) {
    showError(e.message);
    btn.disabled = false;
    label.textContent = 'Sign in →';
  }
}

function showError(msg) {
  const el = document.getElementById('errBox');
  el.textContent = msg;
  el.style.display = 'block';
}

// Enter key support
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Redirect if already logged in
const tok = localStorage.getItem('token');
if (tok) {
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  window.location.href = user.role === 'admin' ? '/admin.html' : '/client.html';
}
</script>
</body>
</html>
