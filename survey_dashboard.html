<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Campaign Analytics Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.1.9/Recharts.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#0d0d12;
  --ink-2:#1a1a24;
  --ink-3:#252533;
  --ink-4:#32324a;
  --wire:rgba(255,255,255,0.07);
  --wire-2:rgba(255,255,255,0.12);
  --fog:#6b6b8a;
  --mist:#9494b0;
  --snow:#e8e8f0;
  --white:#f5f5fa;
  --lime:#b8ff57;
  --lime-dim:rgba(184,255,87,0.12);
  --lime-glow:0 0 40px rgba(184,255,87,0.2);
  --cyan:#57d9ff;
  --cyan-dim:rgba(87,217,255,0.1);
  --rose:#ff6b8a;
  --rose-dim:rgba(255,107,138,0.1);
  --amber:#ffb347;
  --amber-dim:rgba(255,179,71,0.1);
  --violet:#a78bfa;
  --violet-dim:rgba(167,139,250,0.1);
  --r:10px;
  --r-lg:16px;
  --r-xl:24px;
}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--ink);
  color:var(--snow);
  min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%,rgba(184,255,87,0.04) 0%,transparent 70%),
    radial-gradient(ellipse 60% 40% at 90% 80%,rgba(87,217,255,0.04) 0%,transparent 70%);
}
/* ── scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--ink-4);border-radius:4px;}

/* ── header ── */
.hdr{
  border-bottom:1px solid var(--wire);
  padding:18px 32px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  background:rgba(13,13,18,0.85);
  backdrop-filter:blur(16px);
}
.hdr-brand{display:flex;align-items:center;gap:12px;}
.hdr-pip{
  width:36px;height:36px;border-radius:10px;
  background:var(--lime);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:var(--ink);
}
.hdr-title{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.3px;}
.hdr-title span{color:var(--lime);}
.hdr-meta{font-size:12px;color:var(--fog);font-family:'DM Mono',monospace;}
.hdr-right{display:flex;align-items:center;gap:10px;}
/* Company logo — top right, matches client.html */
.company-logo {
  height: 56px; /* Increased from 36px for much better visibility */
  width: auto;
  object-fit: contain;
  opacity: 1; /* Removed the default dimming */
  margin-left: 12px; /* Adds breathing room from the buttons */
  transition: transform 0.2s ease;
  /* Adds a soft white/glow behind the logo to separate it from the dark background */
  filter: drop-shadow(0 2px 10px rgba(255, 255, 255, 0.15)); 
}

.company-logo:hover {
  transform: scale(1.05); /* Slight zoom on hover instead of opacity change */
}
.chip{
  padding:6px 14px;border-radius:999px;
  font-size:12px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;
  border:1px solid transparent;cursor:default;
}
.chip-lime{background:var(--lime-dim);color:var(--lime);border-color:rgba(184,255,87,0.25);}
.chip-cyan{background:var(--cyan-dim);color:var(--cyan);border-color:rgba(87,217,255,0.25);}
.chip-fog {background:rgba(107,107,138,0.15);color:var(--mist);border-color:var(--wire-2);}

/* ── layout ── */
.shell{display:grid;grid-template-columns:1fr 360px;min-height:calc(100vh - 65px);}
.main{padding:28px 32px;overflow-y:auto;border-right:1px solid var(--wire);}
.sidebar{display:flex;flex-direction:column;height:calc(100vh - 65px);position:sticky;top:65px;}

/* ── section headers ── */
.sec-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.sec-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:15px;
  display:flex;align-items:center;gap:8px;
}
.sec-title-dot{
  width:8px;height:8px;border-radius:50%;
  display:inline-block;
}

/* ── upload zone ── */
.upload-zone{
  border:2px dashed var(--wire-2);
  border-radius:var(--r-xl);
  padding:48px 32px;
  text-align:center;
  cursor:pointer;
  transition:all .2s;
  position:relative;
  background:var(--ink-2);
}
.upload-zone:hover,.upload-zone.drag{
  border-color:var(--lime);
  background:var(--lime-dim);
  box-shadow:var(--lime-glow);
}
.upload-icon{font-size:48px;margin-bottom:16px;display:block;}
.upload-title{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;margin-bottom:8px;}
.upload-sub{font-size:14px;color:var(--fog);}
.upload-formats{
  margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
}

/* ── cards ── */
.card{
  background:var(--ink-2);
  border:1px solid var(--wire);
  border-radius:var(--r-lg);
  padding:20px;
  transition:border-color .2s;
}
.card:hover{border-color:var(--wire-2);}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{
  background:var(--ink-3);border:1px solid var(--wire);border-radius:var(--r);
  padding:16px;position:relative;overflow:hidden;
}
.stat-card::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at top left,var(--glow-c,transparent) 0%,transparent 60%);
  pointer-events:none;
}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--fog);margin-bottom:8px;}
.stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;line-height:1;}
.stat-sub{font-size:12px;color:var(--fog);margin-top:4px;}

/* ── chart grid ── */
.chart-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px;}
.chart-card{
  background:var(--ink-2);border:1px solid var(--wire);
  border-radius:var(--r-lg);padding:20px;
  min-height:280px;display:flex;flex-direction:column;
}
.chart-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:13px;
  margin-bottom:4px;display:flex;align-items:center;gap:8px;
}
.chart-sub{font-size:12px;color:var(--fog);margin-bottom:16px;}
.chart-body{flex:1;min-height:200px;}

/* ── loading spinner ── */
.spin{
  display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,.1);
  border-top-color:var(--lime);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.gen-indicator{
  display:flex;align-items:center;gap:10px;
  padding:14px 18px;background:var(--lime-dim);
  border:1px solid rgba(184,255,87,.2);border-radius:var(--r);
  font-size:13px;color:var(--lime);margin-bottom:20px;
}

/* ── tabs ── */
.tabs{display:flex;gap:2px;background:var(--ink-3);padding:3px;border-radius:var(--r);margin-bottom:20px;width:fit-content;}
.tab{
  padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;
  cursor:pointer;color:var(--fog);transition:all .15s;border:none;
  background:transparent;font-family:inherit;
}
.tab.active{background:var(--ink-4);color:var(--white);}
.tab:hover:not(.active){color:var(--mist);}

/* ── insight pills ── */
.insight-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.insight-item{
  padding:14px 16px;background:var(--ink-3);
  border:1px solid var(--wire);border-radius:var(--r);
  font-size:13px;line-height:1.6;color:var(--snow);
  cursor:pointer;transition:all .15s;
  display:flex;align-items:flex-start;gap:10px;
}
.insight-item:hover{border-color:var(--lime);background:var(--lime-dim);}
.insight-icon{font-size:16px;flex-shrink:0;margin-top:1px;}

/* ── chat sidebar ── */
.chat-panel{
  display:flex;flex-direction:column;height:100%;
  background:var(--ink-2);
}
.chat-hdr{
  padding:16px 20px;border-bottom:1px solid var(--wire);
  display:flex;align-items:center;gap:10px;
}
.chat-hdr-icon{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--violet),#7c3aed);
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
.chat-hdr-text{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;}
.chat-hdr-sub{font-size:11px;color:var(--fog);}

.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.msg-bubble{max-width:85%;}
.msg-bubble.user{align-self:flex-end;}
.msg-bubble.bot{align-self:flex-start;}
.bubble-content{
  padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6;
}
.msg-bubble.user .bubble-content{
  background:linear-gradient(135deg,#7c3aed,var(--violet));
  color:#fff;border-bottom-right-radius:4px;
}
.msg-bubble.bot .bubble-content{
  background:var(--ink-3);color:var(--snow);
  border:1px solid var(--wire);border-bottom-left-radius:4px;
}
.msg-time{font-size:10px;color:var(--fog);margin-top:4px;padding:0 4px;}

.chat-input-area{
  padding:14px 16px;border-top:1px solid var(--wire);
  display:flex;flex-direction:column;gap:8px;
}
.chat-suggestions{display:flex;flex-wrap:wrap;gap:6px;}
.sugg-btn{
  padding:5px 10px;background:var(--ink-3);border:1px solid var(--wire-2);
  border-radius:999px;font-size:11px;color:var(--mist);
  cursor:pointer;font-family:inherit;transition:all .15s;
  white-space:nowrap;
}
.sugg-btn:hover{border-color:var(--violet);color:var(--violet);background:var(--violet-dim);}

.chat-input-row{display:flex;gap:8px;}
.chat-input{
  flex:1;padding:10px 14px;
  background:var(--ink-3);border:1px solid var(--wire-2);
  border-radius:var(--r);color:var(--white);font-size:13px;
  font-family:inherit;outline:none;transition:border-color .15s;
}
.chat-input:focus{border-color:var(--violet);}
.chat-input::placeholder{color:var(--fog);}
.send-btn{
  width:40px;height:40px;border-radius:var(--r);
  background:linear-gradient(135deg,#7c3aed,var(--violet));
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:opacity .15s;flex-shrink:0;
}
.send-btn:hover{opacity:.85;}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── table ── */
.data-table{width:100%;border-collapse:collapse;font-size:13px;}
.data-table th{
  padding:10px 14px;background:var(--ink-3);
  border-bottom:1px solid var(--wire-2);
  font-weight:600;font-size:11px;text-transform:uppercase;
  letter-spacing:.5px;color:var(--fog);text-align:left;
}
.data-table td{
  padding:10px 14px;border-bottom:1px solid var(--wire);
  color:var(--snow);
}
.data-table tr:hover td{background:var(--ink-3);}
.data-table tr:last-child td{border-bottom:none;}

/* ── empty state ── */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 32px;text-align:center;color:var(--fog);
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.5;}
.empty-text{font-size:14px;line-height:1.6;}

/* ── responsive ── */
@media(max-width:1100px){
  .shell{grid-template-columns:1fr;}
  .sidebar{height:500px;position:relative;top:0;border-top:1px solid var(--wire);}
  .chart-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;
const { ResponsiveContainer, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip,
        PieChart, Pie, Cell, LineChart, Line, Legend } = window.Recharts;

const PALETTE = ['#b8ff57','#57d9ff','#ff6b8a','#a78bfa','#ffb347','#57ffb8','#ff8c57','#57a8ff'];
const TOOLTIP_STYLE = {
  contentStyle:{background:'#1a1a24',border:'1px solid rgba(255,255,255,0.1)',borderRadius:8,fontSize:12,color:'#e8e8f0'},
  cursor:{fill:'rgba(255,255,255,0.04)'}
};
const API_BASE = window.location.origin;

/* ── Auth ── */
const getToken = () => localStorage.getItem('token');
const authHdrs = () => ({ 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' });

function parseJSON(raw) {
  try { return JSON.parse(raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim()); }
  catch { return null; }
}

/* ═══════════════════════════════════════════════════
   BACKEND AI CALL
═══════════════════════════════════════════════════ */
async function callAI(system, prompt) {
  const r = await fetch(`${API_BASE}/api/ai`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({system, prompt})
  });
  if (!r.ok) throw new Error(`AI ${r.status}`);
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d.text || '';
}

/* ═══════════════════════════════════════════════════
   API LOADERS
═══════════════════════════════════════════════════ */
async function fetchCampaigns() {
  try {
    const r = await fetch(`${API_BASE}/admin/campaigns`, {headers: authHdrs()});
    if (r.status === 401) { window.location.href='/login.html'; return []; }
    return r.ok ? r.json() : [];
  } catch { return []; }
}

async function fetchCampaignData(campaignId) {
  try {
    const r = await fetch(`${API_BASE}/admin/campaign/${campaignId}/sheet-data`, {headers: authHdrs()});
    if (!r.ok) return null;
    const j = await r.json();
    return (j.data && j.data.length) ? j.data : null;
  } catch { return null; }
}

/* ═══════════════════════════════════════════════════
   COLUMN INTROSPECTION
   Analyses actual data columns — no hardcoding
═══════════════════════════════════════════════════ */
function introspectColumns(rows) {
  if (!rows.length) return {};
  const result = {};
  Object.keys(rows[0]).forEach(col => {
    const vals = rows.map(r => r[col]).filter(v => v !== null && v !== '' && v !== undefined);
    if (!vals.length) return;
    const nums = vals.filter(v => !isNaN(Number(v)) && String(v).trim() !== '').map(Number);
    const strs = vals.map(v => String(v).trim());
    const freq = {};
    strs.forEach(v => { freq[v] = (freq[v]||0)+1; });
    const uniq = Object.keys(freq);

    if (nums.length >= vals.length * 0.7 && nums.length >= 2) {
      result[col] = {
        kind: 'numeric',
        min: Math.min(...nums), max: Math.max(...nums),
        mean: +(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(2),
        count: nums.length
      };
    } else if (uniq.length <= 2 && uniq.map(v=>v.toLowerCase()).every(v=>['yes','no','y','n','true','false','m','f','male','female'].includes(v))) {
      result[col] = { kind: 'binary', values: uniq, freq };
    } else if (uniq.length <= 20) {
      result[col] = { kind: 'categorical', values: uniq, freq, unique: uniq.length };
    } else {
      result[col] = { kind: 'text', unique: uniq.length, sample: uniq.slice(0,5) };
    }
  });
  return result;
}

/* Clean rows that are entirely "No Response" */
function cleanRows(rows) {
  return rows.filter(r => {
    const vals = Object.values(r).map(v => String(v||'').trim().toLowerCase());
    const meaningful = vals.filter(v => v && v !== 'no response' && v !== 'undefined' && v !== 'null');
    return meaningful.length >= 2;
  });
}

/* ═══════════════════════════════════════════════════
   AGGREGATION ENGINE  (fully column-agnostic)
═══════════════════════════════════════════════════ */
function aggregate(rows, plan) {
  let data = [...rows];

  if (plan.filter) {
    const {col, op, val} = plan.filter;
    data = data.filter(r => {
      const v = r[col];
      if (op==='eq')       return String(v).toLowerCase()===String(val).toLowerCase();
      if (op==='gte')      return Number(v)>=Number(val);
      if (op==='lte')      return Number(v)<=Number(val);
      if (op==='contains') return String(v).toLowerCase().includes(String(val).toLowerCase());
      return true;
    });
  }

  const clean = v => v !== null && v !== undefined && String(v).trim() !== '' && String(v).toLowerCase() !== 'no response';

  if (plan.type === 'count_by') {
    const freq = {};
    data.forEach(r => { if (clean(r[plan.groupBy])) { const k=String(r[plan.groupBy]).trim(); freq[k]=(freq[k]||0)+1; }});
    return Object.entries(freq).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value).slice(0,15);
  }
  if (plan.type === 'avg_by') {
    const grp = {};
    data.forEach(r => {
      const k = String(r[plan.groupBy]||'').trim();
      const v = Number(r[plan.valueCol]);
      if (!k || !clean(r[plan.groupBy]) || isNaN(v)) return;
      if (!grp[k]) grp[k]=[];
      grp[k].push(v);
    });
    return Object.entries(grp)
      .filter(([,a])=>a.length>0)
      .map(([name,arr])=>({name, value:+(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2)}))
      .sort((a,b)=>b.value-a.value).slice(0,12);
  }
  if (plan.type === 'distribution') {
    const freq = {};
    data.forEach(r => { if (clean(r[plan.groupBy])) { const k=String(r[plan.groupBy]).trim(); freq[k]=(freq[k]||0)+1; }});
    const total = data.length;
    return Object.entries(freq)
      .map(([name,count])=>({name,value:count,pct:+((count/total)*100).toFixed(1)}))
      .sort((a,b)=>b.value-a.value).slice(0,12);
  }
  if (plan.type === 'multi_col_freq') {
    const freq = {};
    (plan.cols||[]).forEach(col => {
      data.forEach(r => { if (clean(r[col])) { const k=String(r[col]).trim(); freq[k]=(freq[k]||0)+1; }});
    });
    return Object.entries(freq).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value).slice(0,15);
  }
  return [];
}

/* ═══════════════════════════════════════════════════
   CHART RENDERER
═══════════════════════════════════════════════════ */
function ChartRenderer({plan, data, title, subtitle}) {
  const chartData = useMemo(() => { try { return aggregate(data, plan); } catch { return []; }}, [data, plan]);

  if (!chartData.length) return (
    <div className="chart-card">
      <div className="chart-title"><span style={{color:PALETTE[0]}}>◆</span> {title}</div>
      <div className="chart-body"><div className="empty"><div className="empty-icon">📊</div><div className="empty-text">Not enough data yet</div></div></div>
    </div>
  );

  const t = plan.chartType || 'bar';
  const h = Math.max(180, chartData.length * (t==='horizontal_bar' ? 36 : 1));

  const chart = (() => {
    if (t === 'pie' || t === 'donut') return (
      <ResponsiveContainer width="100%" height={220}>
        <PieChart>
          <Pie data={chartData} dataKey="value" nameKey="name" cx="50%" cy="50%"
            innerRadius={t==='donut'?55:0} outerRadius={85} paddingAngle={2}>
            {chartData.map((_,i)=><Cell key={i} fill={PALETTE[i%PALETTE.length]}/>)}
          </Pie>
          <Tooltip {...TOOLTIP_STYLE}/>
          <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:11,color:'#9494b0'}}/>
        </PieChart>
      </ResponsiveContainer>
    );
    if (t === 'horizontal_bar') return (
      <ResponsiveContainer width="100%" height={h}>
        <BarChart data={chartData} layout="vertical" margin={{left:110,right:20,top:4,bottom:4}}>
          <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" horizontal={false}/>
          <XAxis type="number" tick={{fontSize:11,fill:'#6b6b8a'}} axisLine={false} tickLine={false}/>
          <YAxis type="category" dataKey="name" tick={{fontSize:11,fill:'#9494b0'}} axisLine={false} tickLine={false} width={106}/>
          <Tooltip {...TOOLTIP_STYLE}/>
          <Bar dataKey="value" radius={[0,4,4,0]}>
            {chartData.map((_,i)=><Cell key={i} fill={PALETTE[i%PALETTE.length]}/>)}
          </Bar>
        </BarChart>
      </ResponsiveContainer>
    );
    if (t === 'line') return (
      <ResponsiveContainer width="100%" height={200}>
        <LineChart data={chartData} margin={{left:8,right:16,top:4,bottom:4}}>
          <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)"/>
          <XAxis dataKey="name" tick={{fontSize:11,fill:'#6b6b8a'}} axisLine={false} tickLine={false}/>
          <YAxis tick={{fontSize:11,fill:'#6b6b8a'}} axisLine={false} tickLine={false}/>
          <Tooltip {...TOOLTIP_STYLE}/>
          <Line type="monotone" dataKey="value" stroke="#b8ff57" strokeWidth={2} dot={{fill:'#b8ff57',r:3}}/>
        </LineChart>
      </ResponsiveContainer>
    );
    return (
      <ResponsiveContainer width="100%" height={200}>
        <BarChart data={chartData} margin={{left:8,right:8,top:4,bottom:4}}>
          <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" vertical={false}/>
          <XAxis dataKey="name" tick={{fontSize:10,fill:'#6b6b8a'}} axisLine={false} tickLine={false}/>
          <YAxis tick={{fontSize:11,fill:'#6b6b8a'}} axisLine={false} tickLine={false}/>
          <Tooltip {...TOOLTIP_STYLE}/>
          <Bar dataKey="value" radius={[4,4,0,0]}>
            {chartData.map((_,i)=><Cell key={i} fill={PALETTE[i%PALETTE.length]}/>)}
          </Bar>
        </BarChart>
      </ResponsiveContainer>
    );
  })();

  return (
    <div className="chart-card">
      <div className="chart-title"><span style={{color:PALETTE[0]}}>◆</span> {title}</div>
      {subtitle && <div className="chart-sub">{subtitle}</div>}
      <div className="chart-body">{chart}</div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   AI PROFILER  — fully dynamic, no hardcoded questions
   Receives actual column names from the live dataset
   and asks the AI to generate charts/stats for *this* data
═══════════════════════════════════════════════════ */
async function profileDataset(rows, campaignName) {
  const cols    = introspectColumns(rows);
  const colKeys = Object.keys(cols);
  const sample  = rows.slice(0, 10);

  // Build a plain-English column description for the prompt
  const colDesc = colKeys.map(k => {
    const c = cols[k];
    if (c.kind === 'numeric')      return `"${k}" [numeric] range:${c.min}–${c.max} mean:${c.mean}`;
    if (c.kind === 'binary')       return `"${k}" [yes/no] values:${Object.entries(c.freq).map(([v,n])=>`${v}(${n})`).join(', ')}`;
    if (c.kind === 'categorical')  return `"${k}" [categorical ${c.unique} vals] top:${Object.entries(c.freq).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([v,n])=>`${v}(${n})`).join(', ')}`;
    return `"${k}" [free text, ${c.unique} unique]`;
  }).join('\n');

  const prompt = `You are a survey analytics expert. Analyse this dataset and produce a JSON dashboard profile.

Campaign: "${campaignName}"
Total responses: ${rows.length}
Columns (EXACT names you MUST use — do NOT invent or modify them):
${colDesc}

Sample rows:
${JSON.stringify(sample, null, 2)}

Return ONLY valid JSON — no markdown, no explanation:
{
  "title": "descriptive campaign title",
  "description": "1-2 sentences describing what this survey measures",
  "keySummary": ["3-5 specific, data-driven findings as plain English sentences"],
  "statCards": [
    {
      "label": "short label max 4 words",
      "valueExpr": "JavaScript expression using variable 'rows' (array of row objects with exact column names above). Must return a displayable value. Example: rows.length  or  Math.round(rows.filter(r=>String(r['ColName']).toLowerCase()==='yes').length/rows.length*100)+'%'  or  (rows.filter(r=>!isNaN(Number(r['ColName']))).reduce((s,r)=>s+Number(r['ColName']),0)/rows.filter(r=>!isNaN(Number(r['ColName']))).length).toFixed(2)",
      "sub": "context subtitle (e.g. 'out of 5', 'of respondents', 'unique values')",
      "color": "#b8ff57"
    }
  ],
  "charts": [
    {
      "title": "chart title",
      "subtitle": "short subtitle",
      "question": "natural language insight this chart answers",
      "icon": "relevant emoji",
      "minRows": 3,
      "plan": {
        "type": "count_by | avg_by | distribution | multi_col_freq",
        "groupBy": "EXACT column name",
        "valueCol": "EXACT column name or null",
        "cols": ["col1","col2"],
        "chartType": "bar | horizontal_bar | pie | donut | line",
        "filter": null
      }
    }
  ]
}

RULES:
- statCards: 4–5 cards. ALWAYS start with total respondents (valueExpr="rows.length"). Then add meaningful KPIs based on the actual columns — averages for numeric questions, yes% for binary, unique counts for text questions.
- charts: 4–6 charts covering the most important questions. Use EXACT column names. Prefer horizontal_bar for text-heavy categoricals (5+ options), pie/donut for binary/small sets, bar for numeric distributions. For multiple related columns (e.g. multiple choice options spread across cols), use multi_col_freq with "cols" array.
- keySummary: be specific — include real numbers from the data.
- Choose colors from: "#b8ff57", "#57d9ff", "#ff6b8a", "#a78bfa", "#ffb347"
- NEVER invent column names. Only use columns listed above.`;

  const raw = await callAI('Return only a valid JSON object. No markdown, no preamble.', prompt);
  return parseJSON(raw);
}

/* ═══════════════════════════════════════════════════
   AI QUERY PLANNER  — chat assistant
═══════════════════════════════════════════════════ */
async function planQuery(question, profile, rows) {
  const cols    = introspectColumns(rows);
  const colKeys = Object.keys(cols);
  const colDesc = colKeys.map(k => {
    const c = cols[k];
    if (c.kind==='numeric')     return `"${k}": numeric (${c.min}–${c.max})`;
    if (c.kind==='binary')      return `"${k}": yes/no — ${Object.keys(c.freq).join('/')}`;
    if (c.kind==='categorical') return `"${k}": categorical — ${Object.keys(c.freq).slice(0,6).join(', ')}`;
    return `"${k}": free text`;
  }).join('\n');

  const system = `You are a survey data analyst. Answer questions about this dataset.

Campaign: "${profile?.title||'Survey'}"
Rows: ${rows.length}
Columns (use EXACT names):
${colDesc}

Return JSON in one of two formats:

FACT (default — use for most questions):
{"responseType":"fact","narrative":"Conversational answer with numbers. 2-4 sentences.","supportingData":[{"label":"...","value":"..."}]}

CHART (only if user asks for a chart OR distribution spans 5+ categories):
{"responseType":"chart","narrative":"2-3 sentence explanation","plan":{"type":"count_by|avg_by|distribution|multi_col_freq","groupBy":"EXACT col","valueCol":"EXACT col or null","cols":["col1","col2"],"chartType":"bar|horizontal_bar|pie|donut|line","filter":null},"title":"chart title","subtitle":"subtitle"}

Return ONLY JSON. No markdown.`;

  const raw = await callAI(system,
    `Question: "${question}"\nSample: ${JSON.stringify(rows.slice(0,5))}`);
  return parseJSON(raw);
}

/* ═══════════════════════════════════════════════════
   STAT CARD VALUE EVALUATOR
   Safely runs AI-generated JS expressions against rows
═══════════════════════════════════════════════════ */
function evalStat(expr, rows) {
  try {
    // eslint-disable-next-line no-new-func
    return new Function('rows', `"use strict"; try { return (${expr}); } catch(e) { return '—'; }`)(rows);
  } catch { return '—'; }
}

/* ═══════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════ */
function App() {
  const [data,            setData]            = useState([]);
  const [colInfo,         setColInfo]         = useState({});
  const [profile,         setProfile]         = useState(null);
  const [profiling,       setProfiling]       = useState(false);
  const [dataSource,      setDataSource]      = useState('none');
  const [activeTab,       setActiveTab]       = useState('dashboard');
  const [chatHistory,     setChatHistory]     = useState([]);
  const [chatInput,       setChatInput]       = useState('');
  const [chatLoading,     setChatLoading]     = useState(false);
  const [adhocCharts,     setAdhocCharts]     = useState([]);
  const [campaigns,       setCampaigns]       = useState([]);
  const [activeCampaign,  setActiveCampaign]  = useState(null);
  const [dropOpen,        setDropOpen]        = useState(false);
  const fileRef    = useRef();
  const chatEndRef = useRef();

  /* ── Boot ── */
  useEffect(() => {
    if (!getToken()) { window.location.href='/login.html'; return; }
    fetchCampaigns().then(list => {
      setCampaigns(list || []);
      const first = (list||[]).find(c=>c.status==='active') || list?.[0];
      if (first) loadCampaign(first);
    });
  }, []);

  useEffect(() => { chatEndRef.current?.scrollIntoView({behavior:'smooth'}); }, [chatHistory]);

  /* ── Load & profile a campaign ── */
  async function loadCampaign(campaign) {
    setActiveCampaign(campaign);
    setDropOpen(false);
    setProfile(null); setAdhocCharts([]); setChatHistory([]); setData([]);
    setDataSource('loading');

    const raw = await fetchCampaignData(campaign.id);
    if (raw && raw.length) {
      const cleaned = cleanRows(raw);
      setData(cleaned);
      setColInfo(introspectColumns(cleaned));
      setDataSource('live');
      await runProfile(cleaned, campaign.name);
    } else {
      setDataSource('empty');
      setProfile({title:campaign.name, description:'No responses collected yet.',
        keySummary:['No survey responses have been collected yet for this campaign.'],
        statCards:[], charts:[]});
    }
  }

  async function runProfile(rows, name) {
    setProfiling(true);
    try {
      const p = await profileDataset(rows, name);
      setProfile(p || fallbackProfile(name));
    } catch(e) {
      console.error('Profile error:', e);
      setProfile(fallbackProfile(name));
    }
    setProfiling(false);
  }

  function fallbackProfile(name) {
    return {title:name||'Survey', description:'Data loaded.', keySummary:[],
            statCards:[{label:'Total Respondents',valueExpr:'rows.length',sub:'responses',color:'#b8ff57'}],
            charts:[]};
  }

  /* ── File upload ── */
  function handleFile(file) {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    const onRows = rawRows => {
      const cleaned = cleanRows(rawRows.filter(r=>Object.values(r).some(v=>v!=null&&v!=='')));
      setData(cleaned); setColInfo(introspectColumns(cleaned));
      setDataSource('upload'); setProfile(null); setAdhocCharts([]); setChatHistory([]);
      runProfile(cleaned, file.name.replace(/\.[^.]+$/,''));
    };
    if (ext==='csv') {
      Papa.parse(file,{header:true,skipEmptyLines:true,dynamicTyping:false,
        transformHeader:h=>h.trim(), complete:r=>onRows(r.data)});
    } else if (ext==='xlsx'||ext==='xls') {
      const rd = new FileReader();
      rd.onload = e => {
        const X = window.XLSX||window.SheetJS;
        const wb = X.read(e.target.result,{type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        onRows(X.utils.sheet_to_json(ws,{defval:''}).map(row=>{
          const c={}; Object.keys(row).forEach(k=>{c[k.trim()]=row[k];}); return c;
        }));
      };
      rd.readAsArrayBuffer(file);
    } else if (ext==='json') {
      const rd = new FileReader();
      rd.onload = e => { try { onRows(JSON.parse(e.target.result)); } catch{ alert('Invalid JSON'); }};
      rd.readAsText(file);
    }
  }

  /* ── Chat ── */
  async function sendChat(text) {
    if (!text.trim()||chatLoading||!profile) return;
    const q = text.trim();
    setChatInput('');
    setChatLoading(true);
    const time = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    setChatHistory(h=>[...h,{role:'user',text:q,time}]);
    try {
      const result = await planQuery(q, profile, data);
      if (!result) throw new Error('No response');
      if (result.responseType==='chart') {
        const id = Date.now();
        setAdhocCharts(c=>[...c,{id,plan:result.plan,title:result.title,subtitle:result.subtitle}]);
        setChatHistory(h=>[...h,{role:'bot',time,text:result.narrative,chartRef:{id,title:result.title}}]);
        setActiveTab('analysis');
      } else {
        setChatHistory(h=>[...h,{role:'bot',time,text:result.narrative,facts:result.supportingData}]);
      }
    } catch(e) {
      setChatHistory(h=>[...h,{role:'bot',text:`Sorry, couldn't process that. ${e.message}`,time:''}]);
    }
    setChatLoading(false);
  }

  /* ── Dynamic stat cards (AI-generated expressions) ── */
  const statCards = useMemo(() => {
    if (!profile?.statCards?.length || !data.length) return [];
    return profile.statCards.map((card,i) => ({
      ...card,
      computed: evalStat(card.valueExpr, data),
      color: card.color || PALETTE[i % PALETTE.length]
    }));
  }, [profile, data]);

  const suggestions = profile?.charts?.slice(0,3).map(c=>c.question) || [
    'What are the most common responses?',
    'Show a breakdown by question',
    'What patterns do you see in the data?'
  ];

  const campaignName = activeCampaign?.name || 'Campaign Analytics';

  /* ═══ RENDER ═══ */

    <>
    {/* ── HEADER ── */}
    <div className="hdr">
      <div className="hdr-brand">
        <div className="hdr-pip">📊</div>
        <div>
          <div className="hdr-title">Campaign <span>Analytics</span></div>
          {profile && <div className="hdr-meta">{profile.title}</div>}
        </div>
      </div>
      <div className="hdr-right">

        {/* Campaign dropdown */}
        {campaigns.length > 0 && (
          <div style={{position:'relative'}}>
            <button className="chip chip-fog"
              style={{cursor:'pointer',border:'1px solid rgba(255,255,255,.15)',fontFamily:'inherit'}}
              onClick={()=>setDropOpen(o=>!o)}>
              📋 {activeCampaign?.name || 'Select Campaign'} ▾
            </button>
            {dropOpen && (
              <div style={{position:'absolute',top:'calc(100% + 6px)',right:0,background:'#1a1a24',
                border:'1px solid rgba(255,255,255,.12)',borderRadius:10,padding:6,
                minWidth:230,zIndex:200,boxShadow:'0 8px 32px rgba(0,0,0,.6)'}}>
                <div style={{padding:'4px 10px',fontSize:10,fontWeight:700,letterSpacing:'.08em',
                  color:'#6b6b8a',textTransform:'uppercase',marginBottom:4}}>Campaigns</div>
                {campaigns.map(c=>(
                  <button key={c.id} onClick={()=>loadCampaign(c)}
                    style={{display:'block',width:'100%',textAlign:'left',padding:'8px 10px',
                      borderRadius:7,border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:13,
                      background:activeCampaign?.id===c.id?'rgba(184,255,87,.1)':'transparent',
                      color:activeCampaign?.id===c.id?'#b8ff57':'#9494b0'}}>
                    <span style={{fontSize:9,marginRight:6,
                      color:c.status==='active'?'#b8ff57':c.status==='draft'?'#ffb347':'#6b6b8a'}}>●</span>
                    {activeCampaign?.id===c.id?'✓ ':''}{c.name}
                  </button>
                ))}
              </div>
            )}
          </div>
        )}

        {profiling
          ? <span className="chip chip-lime"><span className="spin"></span> AI Profiling…</span>
          : profile ? <span className="chip chip-lime">✦ Profiled</span> : null}

        {dataSource==='live'   && <span className="chip chip-cyan">🔴 Live — {data.length} responses</span>}
        {dataSource==='upload' && <span className="chip chip-cyan">📁 Uploaded — {data.length} rows</span>}
        {dataSource==='empty'  && <span className="chip chip-fog">📭 No responses yet</span>}
        {dataSource==='loading'&& <span className="chip chip-fog"><span className="spin"></span> Loading…</span>}

        {dataSource==='live' && (
          <button className="chip chip-fog"
            style={{cursor:'pointer',border:'1px solid rgba(255,255,255,.1)',fontFamily:'inherit'}}
            onClick={()=>activeCampaign&&loadCampaign(activeCampaign)}>↻ Refresh</button>
        )}
        <button className="chip chip-fog"
          style={{cursor:'pointer',border:'1px solid rgba(255,255,255,.1)',fontFamily:'inherit'}}

        <a href="/client.html" style={{textDecoration:'none'}}>

        <a href="/admin.html" style={{textDecoration:'none'}}>

        {/* ── DASHBOARD TAB ── */}

              <div className="empty-text">No responses collected yet for <strong style={{color:'#b8ff57'}}>{campaignName}</strong>.<br/>Run the survey agent to start collecting data.</div>

            <span style={{fontSize:12,color:'#6b6b8a'}}>Ask questions in the chat →</span>
          </div>
          {adhocCharts.length===0 ? (
            <div className="empty">
              <div className="empty-icon">🔍</div>
              <div className="empty-text">Ask a question in the chat panel to generate charts.<br/>
                Try: <em>"Show breakdown by gender"</em> or <em>"What's the average score?"</em></div>
            </div>
          ) : (
            <div className="chart-grid">
              {adhocCharts.map(c=>(
                <ChartRenderer key={c.id} plan={c.plan} data={data} title={c.title} subtitle={c.subtitle}/>
              ))}
            </div>
          )}
          </>
        )}

        {/* ── RAW DATA TAB ── */}
        {activeTab==='data' && (
          data.length===0 ? (
            <div className="empty"><div className="empty-icon">🗂</div><div className="empty-text">No data loaded</div></div>
          ) : (
            <>
            <div style={{overflowX:'auto',border:'1px solid rgba(255,255,255,0.07)',borderRadius:12}}>
              <table className="data-table">
                <thead><tr>{Object.keys(data[0]).map(k=><th key={k}>{k}</th>)}</tr></thead>
                <tbody>
                  {data.slice(0,100).map((r,i)=>(
                    <tr key={i}>{Object.values(r).map((v,j)=><td key={j}>{String(v??'')}</td>)}</tr>
                  ))}
                </tbody>
              </table>
            </div>
            {data.length>100 && <div style={{textAlign:'center',padding:'12px',fontSize:12,color:'#6b6b8a'}}>Showing 100 of {data.length} rows</div>}
            </>
          )
        )}
      </div>

      {/* ── CHAT SIDEBAR ── */}
      <div className="sidebar">
        <div className="chat-panel">
          <div className="chat-hdr">
            <div className="chat-hdr-icon">🤖</div>
            <div>
              <div className="chat-hdr-text">Data Assistant</div>
              <div className="chat-hdr-sub">
                {profiling ? 'Profiling dataset…' : profile ? `${data.length} responses · ${Object.keys(colInfo).length} columns` : 'Select a campaign'}
              </div>
            </div>
          </div>

          <div className="chat-msgs">
            {chatHistory.length===0 && (
              <div style={{padding:'20px 0',textAlign:'center',color:'#6b6b8a',fontSize:13,lineHeight:1.8}}>
                <div style={{fontSize:32,marginBottom:12}}>💬</div>
                Ask anything about <strong style={{color:'#9494b0'}}>{campaignName}</strong>.<br/>
                I know every question and every answer in this dataset.
              </div>
            )}
            {chatHistory.map((m,i)=>(
              <div key={i} className={`msg-bubble ${m.role}`}>
                <div className="bubble-content">
                  {m.text}
                  {m.facts?.length>0 && (
                    <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:4}}>
                      {m.facts.map((f,j)=>(
                        <div key={j} style={{display:'flex',justifyContent:'space-between',
                          padding:'4px 0',borderBottom:'1px solid rgba(255,255,255,0.08)',fontSize:12}}>
                          <span style={{color:'#9494b0'}}>{f.label}</span>
                          <span style={{fontWeight:600,color:'#b8ff57'}}>{f.value}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  {m.chartRef && (
                    <div style={{marginTop:10,padding:'6px 10px',background:'rgba(87,217,255,0.08)',
                      borderRadius:6,fontSize:11,color:'#57d9ff',cursor:'pointer'}}
                      onClick={()=>setActiveTab('analysis')}>
                      📊 Chart → {m.chartRef.title}
                    </div>
                  )}
                </div>
                {m.time && <div className="msg-time">{m.time}</div>}
              </div>
            ))}
            {chatLoading && (
              <div className="msg-bubble bot">
                <div className="bubble-content" style={{display:'flex',alignItems:'center',gap:8,color:'#6b6b8a'}}>
                  <span className="spin"></span> Thinking…
                </div>
              </div>
            )}
            <div ref={chatEndRef}/>
          </div>

          <div className="chat-input-area">
            <div className="chat-suggestions">
              {suggestions.map((s,i)=>(
                <button key={i} className="sugg-btn" onClick={()=>sendChat(s)}>{s}</button>
              ))}
            </div>
            <div className="chat-input-row">
              <input className="chat-input" value={chatInput}
                onChange={e=>setChatInput(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendChat(chatInput)}
                placeholder={profile?`Ask about ${campaignName}…`:'Load a campaign first…'}
                disabled={!profile||chatLoading}/>
              <button className="send-btn" onClick={()=>sendChat(chatInput)}
                disabled={!profile||chatLoading||!chatInput.trim()}>↑</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
