<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Survey Intelligence Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#0d0d12;
  --ink-2:#1a1a24;
  --ink-3:#252533;
  --ink-4:#32324a;
  --wire:rgba(255,255,255,0.07);
  --wire-2:rgba(255,255,255,0.12);
  --fog:#6b6b8a;
  --mist:#9494b0;
  --snow:#e8e8f0;
  --white:#f5f5fa;
  --lime:#b8ff57;
  --lime-dim:rgba(184,255,87,0.12);
  --lime-glow:0 0 40px rgba(184,255,87,0.2);
  --cyan:#57d9ff;
  --cyan-dim:rgba(87,217,255,0.1);
  --rose:#ff6b8a;
  --rose-dim:rgba(255,107,138,0.1);
  --amber:#ffb347;
  --amber-dim:rgba(255,179,71,0.1);
  --violet:#a78bfa;
  --violet-dim:rgba(167,139,250,0.1);
  --r:10px;
  --r-lg:16px;
  --r-xl:24px;
}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--ink);
  color:var(--snow);
  min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%,rgba(184,255,87,0.04) 0%,transparent 70%),
    radial-gradient(ellipse 60% 40% at 90% 80%,rgba(87,217,255,0.04) 0%,transparent 70%);
}
/* ── scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--ink-4);border-radius:4px;}

/* ── header ── */
.hdr{
  border-bottom:1px solid var(--wire);
  padding:18px 32px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  background:rgba(13,13,18,0.85);
  backdrop-filter:blur(16px);
}
.hdr-brand{display:flex;align-items:center;gap:12px;}
.hdr-pip{
  width:36px;height:36px;border-radius:10px;
  background:var(--lime);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:var(--ink);
}
.hdr-title{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.3px;}
.hdr-title span{color:var(--lime);}
.hdr-meta{font-size:12px;color:var(--fog);font-family:'DM Mono',monospace;}
.hdr-right{display:flex;align-items:center;gap:10px;}
/* Company logo — top right, matches client.html */
.company-logo{
  height:36px;width:auto;object-fit:contain;
  opacity:.9;transition:opacity .2s;
}
.company-logo:hover{opacity:1;}
.chip{
  padding:6px 14px;border-radius:999px;
  font-size:12px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;
  border:1px solid transparent;cursor:default;
}
.chip-lime{background:var(--lime-dim);color:var(--lime);border-color:rgba(184,255,87,0.25);}
.chip-cyan{background:var(--cyan-dim);color:var(--cyan);border-color:rgba(87,217,255,0.25);}
.chip-fog {background:rgba(107,107,138,0.15);color:var(--mist);border-color:var(--wire-2);}

/* ── layout ── */
.shell{display:grid;grid-template-columns:1fr 360px;min-height:calc(100vh - 65px);}
.main{padding:28px 32px;overflow-y:auto;border-right:1px solid var(--wire);}
.sidebar{display:flex;flex-direction:column;height:calc(100vh - 65px);position:sticky;top:65px;}

/* ── section headers ── */
.sec-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.sec-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:15px;
  display:flex;align-items:center;gap:8px;
}
.sec-title-dot{
  width:8px;height:8px;border-radius:50%;
  display:inline-block;
}

/* ── upload zone ── */
.upload-zone{
  border:2px dashed var(--wire-2);
  border-radius:var(--r-xl);
  padding:48px 32px;
  text-align:center;
  cursor:pointer;
  transition:all .2s;
  position:relative;
  background:var(--ink-2);
}
.upload-zone:hover,.upload-zone.drag{
  border-color:var(--lime);
  background:var(--lime-dim);
  box-shadow:var(--lime-glow);
}
.upload-icon{font-size:48px;margin-bottom:16px;display:block;}
.upload-title{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;margin-bottom:8px;}
.upload-sub{font-size:14px;color:var(--fog);}
.upload-formats{
  margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
}

/* ── cards ── */
.card{
  background:var(--ink-2);
  border:1px solid var(--wire);
  border-radius:var(--r-lg);
  padding:20px;
  transition:border-color .2s;
}
.card:hover{border-color:var(--wire-2);}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{
  background:var(--ink-3);border:1px solid var(--wire);border-radius:var(--r);
  padding:16px;position:relative;overflow:hidden;
}
.stat-card::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at top left,var(--glow-c,transparent) 0%,transparent 60%);
  pointer-events:none;
}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--fog);margin-bottom:8px;}
.stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;line-height:1;}
.stat-sub{font-size:12px;color:var(--fog);margin-top:4px;}

/* ── chart grid ── */
.chart-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px;}
.chart-card{
  background:var(--ink-2);border:1px solid var(--wire);
  border-radius:var(--r-lg);padding:20px;
  min-height:280px;display:flex;flex-direction:column;
}
.chart-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:13px;
  margin-bottom:4px;display:flex;align-items:center;gap:8px;
}
.chart-sub{font-size:12px;color:var(--fog);margin-bottom:16px;}
.chart-body{flex:1;min-height:200px;}

/* ── loading spinner ── */
.spin{
  display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,.1);
  border-top-color:var(--lime);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.gen-indicator{
  display:flex;align-items:center;gap:10px;
  padding:14px 18px;background:var(--lime-dim);
  border:1px solid rgba(184,255,87,.2);border-radius:var(--r);
  font-size:13px;color:var(--lime);margin-bottom:20px;
}

/* ── tabs ── */
.tabs{display:flex;gap:2px;background:var(--ink-3);padding:3px;border-radius:var(--r);margin-bottom:20px;width:fit-content;}
.tab{
  padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;
  cursor:pointer;color:var(--fog);transition:all .15s;border:none;
  background:transparent;font-family:inherit;
}
.tab.active{background:var(--ink-4);color:var(--white);}
.tab:hover:not(.active){color:var(--mist);}

/* ── insight pills ── */
.insight-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.insight-item{
  padding:14px 16px;background:var(--ink-3);
  border:1px solid var(--wire);border-radius:var(--r);
  font-size:13px;line-height:1.6;color:var(--snow);
  cursor:pointer;transition:all .15s;
  display:flex;align-items:flex-start;gap:10px;
}
.insight-item:hover{border-color:var(--lime);background:var(--lime-dim);}
.insight-icon{font-size:16px;flex-shrink:0;margin-top:1px;}

/* ── chat sidebar ── */
.chat-panel{
  display:flex;flex-direction:column;height:100%;
  background:var(--ink-2);
}
.chat-hdr{
  padding:16px 20px;border-bottom:1px solid var(--wire);
  display:flex;align-items:center;gap:10px;
}
.chat-hdr-icon{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--violet),#7c3aed);
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
.chat-hdr-text{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;}
.chat-hdr-sub{font-size:11px;color:var(--fog);}

.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.msg-bubble{max-width:85%;}
.msg-bubble.user{align-self:flex-end;}
.msg-bubble.bot{align-self:flex-start;}
.bubble-content{
  padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6;
}
.msg-bubble.user .bubble-content{
  background:linear-gradient(135deg,#7c3aed,var(--violet));
  color:#fff;border-bottom-right-radius:4px;
}
.msg-bubble.bot .bubble-content{
  background:var(--ink-3);color:var(--snow);
  border:1px solid var(--wire);border-bottom-left-radius:4px;
}
.msg-time{font-size:10px;color:var(--fog);margin-top:4px;padding:0 4px;}

.chat-input-area{
  padding:14px 16px;border-top:1px solid var(--wire);
  display:flex;flex-direction:column;gap:8px;
}
.chat-suggestions{display:flex;flex-wrap:wrap;gap:6px;}
.sugg-btn{
  padding:5px 10px;background:var(--ink-3);border:1px solid var(--wire-2);
  border-radius:999px;font-size:11px;color:var(--mist);
  cursor:pointer;font-family:inherit;transition:all .15s;
  white-space:nowrap;
}
.sugg-btn:hover{border-color:var(--violet);color:var(--violet);background:var(--violet-dim);}

.chat-input-row{display:flex;gap:8px;}
.chat-input{
  flex:1;padding:10px 14px;
  background:var(--ink-3);border:1px solid var(--wire-2);
  border-radius:var(--r);color:var(--white);font-size:13px;
  font-family:inherit;outline:none;transition:border-color .15s;
}
.chat-input:focus{border-color:var(--violet);}
.chat-input::placeholder{color:var(--fog);}
.send-btn{
  width:40px;height:40px;border-radius:var(--r);
  background:linear-gradient(135deg,#7c3aed,var(--violet));
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:opacity .15s;flex-shrink:0;
}
.send-btn:hover{opacity:.85;}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── table ── */
.data-table{width:100%;border-collapse:collapse;font-size:13px;}
.data-table th{
  padding:10px 14px;background:var(--ink-3);
  border-bottom:1px solid var(--wire-2);
  font-weight:600;font-size:11px;text-transform:uppercase;
  letter-spacing:.5px;color:var(--fog);text-align:left;
}
.data-table td{
  padding:10px 14px;border-bottom:1px solid var(--wire);
  color:var(--snow);
}
.data-table tr:hover td{background:var(--ink-3);}
.data-table tr:last-child td{border-bottom:none;}

/* ── empty state ── */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 32px;text-align:center;color:var(--fog);
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.5;}
.empty-text{font-size:14px;line-height:1.6;}

/* ── responsive ── */
@media(max-width:1100px){
  .shell{grid-template-columns:1fr;}
  .sidebar{height:500px;position:relative;top:0;border-top:1px solid var(--wire);}
  .chart-grid{grid-template-columns:1fr;}
}
</style>

/* ═══════════════════════════════════════════════════════════════
   VERTEX AI BACKEND CALL  (routes through /api/ai on our FastAPI server)
   Replaces the direct Anthropic API call — uses the same Vertex AI
   model cascade (gemini-2.0-flash → gemini-1.5-flash) that the rest
   of the survey agent uses for transcript extraction and gender detection.
═══════════════════════════════════════════════════════════════ */
const API_BASE = window.location.origin; // e.g. http://localhost:8000

async function callAI(systemPrompt, userPrompt, _maxTokens = 2000) {
  const res = await fetch(`${API_BASE}/api/ai`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system: systemPrompt, prompt: userPrompt })
  });
  if (!res.ok) throw new Error(`AI endpoint error ${res.status}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.text || '';
}

/* ═══════════════════════════════════════════════════════════════
   UNIVERSAL ROW NORMALISER
   Handles every column naming variant:
     • CSV upload:    "Q1 - (Satisfaction With Government) " (trailing spaces),
                      "Q5 - (Top 3 Concerns)" merged header, double-header rows
     • Google Sheet:  "Q1 - (How Satisfied are you with the Government)",
                      "Concern1","Concern2","Concern3" separate columns
     • Agent output:  "q1_satisfaction", "q5_top3_concerns"
     • Internal:       Q1, Q2, Q3, Q4, Concern1/2/3 (already normalised)
═══════════════════════════════════════════════════════════════ */
function normaliseRow(row) {
  // Build a trimmed-key version of the row so trailing/leading spaces
  // in CSV column headers never cause a miss
  const trimmedRow = {};
  Object.keys(row).forEach(k => { trimmedRow[k.trim()] = row[k]; });

  // Primary exact lookup (tries trimmed keys first, then original)
  const g = (keys) => {
    for (const k of keys) {
      const kt = k.trim();
      // Try trimmed row first
      let v = trimmedRow[kt];
      if (v === undefined) v = trimmedRow[k];
      if (v === undefined) v = row[k];
      if (v !== undefined && v !== null && String(v).trim() !== '') return String(v).trim();
    }
    // Fallback: partial match — find any key that contains one of our target strings
    const allKeys = Object.keys(trimmedRow);
    for (const k of keys) {
      const kt = k.trim().toLowerCase();
      const match = allKeys.find(ak => ak.toLowerCase().includes(kt) || kt.includes(ak.toLowerCase()));
      if (match) {
        const v = trimmedRow[match];
        if (v !== undefined && v !== null && String(v).trim() !== '') return String(v).trim();
      }
    }
    return '';
  };

  // Numeric lookup — returns the number, or null if missing/No Response
  const gNum = (keys) => {
    const raw = g(keys);
    if (!raw || raw.toLowerCase() === 'no response') return null;
    const n = Number(raw);
    return isNaN(n) ? null : n;
  };

  // Q5 concerns — handle both merged single-cell and three separate columns
  const mergedQ5 = g([
    'Q5 - (Top 3 Concerns)', 'Question 5 (Top 3 Concerns)',
    'q5_top3_concerns', 'Q5'
  ]);
  // Separate concern columns (preferred when present)
  const rawC1 = g(['Concern1', 'concern1']);
  const rawC2 = g(['Concern2', 'concern2']);
  const rawC3 = g(['Concern3', 'concern3']);
  // If separate columns are missing, split the merged Q5 cell
  const splitQ5 = mergedQ5 ? mergedQ5.split(',').map(s => s.trim()) : [];
  const c1 = rawC1 || splitQ5[0] || '';
  const c2 = rawC2 || splitQ5[1] || '';
  const c3 = rawC3 || splitQ5[2] || '';

  const q1 = gNum([
    'Q1 - (How Satisfied are you with the Government)',
    'Q1 - (Satisfaction With Government)',
    'Q1 - (Govt Satisfaction)',
    'Question 1 (Govt Satisfaction)',
    'q1_satisfaction', 'Q1'
  ]);
  const q2 = gNum([
    'Q2 - (How do you think the Government has done on tacking Price rise)',
    'Q2 - (Government Handling Of Price Rise)',
    'Q2 - (Price Rise)',
    'Question 2 (Price Rise)',
    'q2_price_rise', 'Q2'
  ]);

  return {
    Call_id:  g(['Call_id','call_id','Question','question','#','Row','row']) || '',
    age:      g(['age','Age','AGE']),
    Gender:   g(['Gender','gender','GENDER']),
    State:    g(['State','state','STATE']),
    Q1: q1,   // null means "No Response"; charts skip nulls; 0 means genuine score 0
    Q2: q2,
    Q3: g([
      'Q3 - (Will you vote for the Government)',

    ]),

      "Q4 - (Who do you think is India's greatest sportsman)",
      'Q4 - (Greatest Sportsman)',

/* ═══════════════════════════════════════════════════════════════
   SURVEY SCHEMA — single source of truth for column meanings.
   Injected into every AI prompt so the chatbot always knows
   exactly what Q1–Q4 mean, regardless of column names in the data.
═══════════════════════════════════════════════════════════════ */
const SURVEY_SCHEMA = `
SURVEY COLUMN DEFINITIONS (use these exact descriptions — never guess):
- Call_id   : Unique identifier for each survey call
- age       : Respondent's age in years (numeric)
- Gender    : Respondent's gender — M (Male), F (Female), or Unknown (voice-detected)
- State     : Indian state of residence of the respondent
- Q1        : Government Satisfaction Score — "How satisfied are you with the Government?"
              Scale: 0 = No Opinion, 1 = Very Dissatisfied, 2 = Dissatisfied,
              3 = Neither Dissatisfied nor Satisfied, 4 = Satisfied, 5 = Extremely Satisfied
- Q2        : Price Rise Handling Score — "How do you think the Government has done on tackling price rise?"
              Same scale: 0 = No Opinion, 1 = Very Dissatisfied, 2 = Dissatisfied,
              3 = Neither Dissatisfied nor Satisfied, 4 = Satisfied, 5 = Extremely Satisfied
- Q3        : Voting Intention — "Will you vote for the Government?" — Yes or No
- Q4        : India's Greatest Sportsman — "Who do you think is India's greatest sportsman?" (open text)
- Concern1  : Respondent's 1st biggest national concern (from: Inflation, Law and Order,
              Joblessness, Pollution, Relations with neighbours)
- Concern2  : Respondent's 2nd biggest national concern (same options as Concern1)
- Concern3  : Respondent's 3rd biggest national concern (same options as Concern1)
`;

/* ── Load live data from Google Sheet via /api/survey-data ── */
async function loadSurveyData() {
  try {
    const res = await fetch(`${API_BASE}/api/survey-data`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.error || !json.data?.length) return null;
    return cleanData(json.data.map(normaliseRow));
  } catch(e) {
    console.warn('Could not load sheet data:', e.message);
    return null;
  }
}

function parseJSON(raw) {
  try {
    const cleaned = raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
    return JSON.parse(cleaned);
  } catch { return null; }
}

/* ═══════════════════════════════════════════════════════════════
   DATA CLEANER
   Removes rows where the respondent declined (all meaningful fields
   are "No Response") and filters out completely empty / header rows.
   Called after normalisation before passing data to the AI/charts.
═══════════════════════════════════════════════════════════════ */
function cleanData(rows) {
  const HEADER_WORDS = ['concern','question','call_id','gender','state','age','q1','q2','q3','q4','q5'];
  return rows.filter(r => {
    // Drop rows with no age AND no state (likely header or junk rows)
    if (!r.age && !r.State) return false;
    // Drop rows where "age" is a header keyword (double-header row artifact)
    if (r.age && HEADER_WORDS.some(w => String(r.age).toLowerCase().includes(w))) return false;
    // Drop rows where every meaningful survey field is "No Response" (declined calls)
    const fields = [r.age, r.Gender, r.State, r.Q3, r.Q4, r.Concern1];
    const allNoResponse = fields.every(v =>
      !v || v === '' || String(v).toLowerCase() === 'no response'
    );
    return !allNoResponse;
  });
}

/* ═══════════════════════════════════════════════════════════════
   DATA ANALYSIS HELPERS
═══════════════════════════════════════════════════════════════ */
function summarise(data) {
  if (!data.length) return {};
  const keys = Object.keys(data[0]);
  const out = {};
  keys.forEach(k => {
    const vals = data.map(r => r[k]);
    const nums = vals.filter(v => v !== null && v !== '' && !isNaN(Number(v))).map(Number);
    if (nums.length > data.length * 0.5) {
      out[k] = {type:'numeric', min:Math.min(...nums), max:Math.max(...nums),
        mean:(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(2), count:nums.length};
    } else {
      const freq = {};
      vals.forEach(v => { const s = String(v||''); freq[s] = (freq[s]||0)+1; });
      out[k] = {type:'categorical', unique:Object.keys(freq).length,
        topValues:Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,5)};
    }
  });
  return out;
}

function runAggregation(data, plan) {
  /* plan: {type, groupBy, valueCol, filter, operation} */
  let rows = [...data];
  if (plan.filter) {
    const {col, op, val} = plan.filter;
    rows = rows.filter(r => {
      const rv = r[col];
      if (op === 'eq')  return String(rv) === String(val);
      if (op === 'gte') return Number(rv) >= Number(val);
      if (op === 'lte') return Number(rv) <= Number(val);
      if (op === 'contains') return String(rv).toLowerCase().includes(String(val).toLowerCase());
      return true;
    });
  }
  if (plan.type === 'count_by') {
    const freq = {};
    rows.forEach(r => { const k = String(r[plan.groupBy]||'N/A'); freq[k]=(freq[k]||0)+1; });
    return Object.entries(freq).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
  }
  if (plan.type === 'avg_by') {
    const groups = {};
    rows.forEach(r => {
      const k = String(r[plan.groupBy]||'N/A');
      if (!groups[k]) groups[k] = [];
      const rawV = r[plan.valueCol];
      if (rawV === null || rawV === undefined || rawV === '') return;
      const v = Number(rawV);
      if (!isNaN(v)) groups[k].push(v);
    });
    return Object.entries(groups).map(([name,arr])=>({
      name, value:parseFloat((arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2))
    })).sort((a,b)=>b.value-a.value);
  }
  if (plan.type === 'distribution') {
    const freq = {};
    rows.forEach(r => { const k = String(r[plan.groupBy]||'N/A'); freq[k]=(freq[k]||0)+1; });
    const total = rows.length;
    return Object.entries(freq).map(([name,count])=>({name,value:count,pct:((count/total)*100).toFixed(1)}))
      .sort((a,b)=>b.value-a.value);
  }
  if (plan.type === 'cross_tab') {
    const result = {};
    rows.forEach(r => {
      const g = String(r[plan.groupBy]||'N/A');
      const v = String(r[plan.valueCol]||'N/A');
      if (!result[g]) result[g] = {};
      result[g][v] = (result[g][v]||0)+1;
    });
    return result;
  }
  if (plan.type === 'concern_frequency') {
    const freq = {};
    rows.forEach(r => {
      ['Concern1','Concern2','Concern3'].forEach(c => {
        if (r[c] && r[c] !== 'undefined') freq[r[c]] = (freq[r[c]]||0)+1;
      });
    });
    return Object.entries(freq).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
  }
  return [];
}

/* ═══════════════════════════════════════════════════════════════
   CHART RENDERER  (picks the best chart type from plan)
═══════════════════════════════════════════════════════════════ */
function ChartRenderer({ plan, data, title, subtitle }) {
  const processed = useMemo(() => {
    try { return runAggregation(data, plan); } catch { return []; }
  }, [data, plan]);

  const chartData = Array.isArray(processed) ? processed : [];

  const renderChart = () => {
    if (!chartData.length) return <div className="empty"><div className="empty-icon">📊</div><div className="empty-text">No data for this chart</div></div>;
    const t = plan.chartType || 'bar';

    if (t === 'pie' || t === 'donut') {
      return (
        <ResponsiveContainer width="100%" height={200}>
          <PieChart>
            <Pie data={chartData} dataKey="value" nameKey="name"
              cx="50%" cy="50%"
              innerRadius={t==='donut'?50:0} outerRadius={80}
              paddingAngle={2}>
              {chartData.map((_, i) => <Cell key={i} fill={PALETTE[i%PALETTE.length]}/>)}
            </Pie>
            <Tooltip {...TOOLTIP_STYLE}/>
            <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:11,color:'#9494b0'}}/>
          </PieChart>
        </ResponsiveContainer>
      );
    }
    if (t === 'horizontal_bar') {
      return (
        <ResponsiveContainer width="100%" height={Math.max(180, chartData.length*36)}>
          <BarChart data={chartData} layout="vertical" margin={{left:80,right:16,top:4,bottom:4}}>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" horizontal={false}/>
            <XAxis type="number" tick={{fontSize:11,fill:'#6b6b8a'}} axisLine={false} tickLine={false}/>
            <YAxis type="category" dataKey="name" tick={{fontSize:11,fill:'#9494b0'}} axisLine={false} tickLine={false} width={76}/>
            <Tooltip {...TOOLTIP_STYLE}/>
            <Bar dataKey="value" radius={[0,4,4,0]}>
              {chartData.map((_,i)=><Cell key={i} fill={PALETTE[i%PALETTE.length]}/>)}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      );
    }
    if (t === 'line') {
      return (
        <ResponsiveContainer width="100%" height={200}>
          <LineChart data={chartData} margin={{left:8,right:16,top:4,bottom:4}}>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)"/>
            <XAxis dataKey="name" tick={{fontSize:11,fill:'#6b6b8a'}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fontSize:11,fill:'#6b6b8a'}} axisLine={false} tickLine={false}/>
            <Tooltip {...TOOLTIP_STYLE}/>
            <Line type="monotone" dataKey="value" stroke="#b8ff57" strokeWidth={2} dot={{fill:'#b8ff57',r:3}}/>
          </LineChart>
        </ResponsiveContainer>
      );
    }
    /* default: vertical bar */
    return (
      <ResponsiveContainer width="100%" height={200}>
        <BarChart data={chartData} margin={{left:8,right:8,top:4,bottom:4}}>
          <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" vertical={false}/>
          <XAxis dataKey="name" tick={{fontSize:10,fill:'#6b6b8a'}} axisLine={false} tickLine={false}/>
          <YAxis tick={{fontSize:11,fill:'#6b6b8a'}} axisLine={false} tickLine={false}/>
          <Tooltip {...TOOLTIP_STYLE}/>
          <Bar dataKey="value" radius={[4,4,0,0]}>
            {chartData.map((_,i)=><Cell key={i} fill={PALETTE[i%PALETTE.length]}/>)}
          </Bar>
        </BarChart>
      </ResponsiveContainer>
    );
  };

  return (
    <div className="chart-card">
      <div className="chart-title">
        <span style={{color:PALETTE[0]}}>◆</span> {title}
      </div>
      {subtitle && <div className="chart-sub">{subtitle}</div>}
      <div className="chart-body">{renderChart()}</div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   AGENT: DATASET PROFILER
   Asks Claude to understand the dataset and return structured schema
═══════════════════════════════════════════════════════════════ */
async function profileDataset(data) {
  const sample = data.slice(0, 10);
  const stats  = summarise(data);
  const prompt = `You are a data intelligence agent. Analyse this survey dataset and return a JSON profile.

${SURVEY_SCHEMA}

Dataset sample (first 10 rows):
${JSON.stringify(sample, null, 2)}

Column statistics:
${JSON.stringify(stats, null, 2)}

Total rows: ${data.length}

Return ONLY a JSON object with this exact shape:
{
  "title": "short descriptive title for this dataset",
  "description": "1-2 sentence description of what this survey measures",
  "columns": {
    "<col_name>": {
      "label": "human readable label",
      "type": "numeric|categorical|text|likert",
      "description": "what this column represents",
      "isSurveyQuestion": true/false,
      "questionNumber": null or integer
    }
  },
  "suggestedInsights": [
    {
      "question": "natural language question this chart answers",
      "icon": "emoji",
      "plan": {
        "type": "count_by|avg_by|distribution|cross_tab|concern_frequency",
        "groupBy": "<column>",
        "valueCol": "<column or null>",
        "chartType": "bar|horizontal_bar|pie|donut|line",
        "filter": null
      },
      "title": "chart title",
      "subtitle": "short subtitle",
      "minRows": <minimum number of rows needed for this chart to be meaningful>
    }
  ],
  "keySummary": ["3-5 key facts about the data as plain English sentences"]
}

IMPORTANT rules:
- Use the SURVEY COLUMN DEFINITIONS above to populate the "label" and "description" fields for each column — do NOT invent or guess what Q1/Q2/Q3/Q4 mean; use the exact question text provided.
- For suggestedInsights, only include a chart if it would be genuinely informative.
- Provide at most 4 chart suggestions — quality over quantity.
- For each chart set minRows: the minimum rows needed (e.g. gender breakdown needs at least 5, state breakdown needs at least 8).
- Focus on the most impactful insights: satisfaction scores, concern frequency, voting intent, gender split.
- Do NOT suggest a chart for every single column.`;

  const raw = await callAI(prompt, 'Profile this dataset and return the JSON.', 3000);
  return parseJSON(raw);
}

/* ═══════════════════════════════════════════════════════════════
   AGENT: QUERY PLANNER
   Takes a natural language question and returns an execution plan
═══════════════════════════════════════════════════════════════ */
async function planQuery(question, profile, data) {
  const stats = summarise(data);
  const concerns = runAggregation(data, {type:'concern_frequency'});
  const system = `You are a survey data analysis agent. Your job is to answer natural language questions about a dataset accurately and concisely.

${SURVEY_SCHEMA}

Dataset profile:
${JSON.stringify(profile, null, 2)}

Column statistics:
${JSON.stringify(stats, null, 2)}

Available columns with full question text:
- Call_id: Unique call identifier
- age: Respondent age
- Gender: M / F / Unknown (voice-detected, not asked)
- State: Indian state of residence
- Q1: "How satisfied are you with the Government?" (0–5 scale)
- Q2: "How do you think the Government has done on tackling price rise?" (0–5 scale)
- Q3: "Will you vote for the Government?" (Yes / No)
- Q4: "Who do you think is India's greatest sportsman?" (open answer)
- Concern1 / Concern2 / Concern3: Top 3 national concerns chosen by respondent
Total rows: ${data.length}
Concern frequencies: ${JSON.stringify(concerns)}

RESPONSE RULES:
- DEFAULT to a FACT response with a clear narrative answer. Only use a CHART response when the user explicitly asks for a chart/graph/visualisation, OR when a distribution across many categories (5+) genuinely cannot be expressed in text.
- Never generate a chart just because a chart could be made. Answer the question in text first.
- For most questions (averages, counts, comparisons, rankings), a FACT response is better.

You can generate two types of responses:

1. FACT response (DEFAULT — use this for most questions):
{
  "responseType": "fact",
  "narrative": "Complete conversational answer with specific numbers, percentages and comparisons. Be precise and insightful. 3-5 sentences.",
  "supportingData": [{"label":"...", "value":"..."}]
}

2. CHART response (only when explicitly requested or genuinely needed for many-category distributions):
{
  "responseType": "chart",
  "narrative": "2-3 sentences explaining what this chart shows and the key takeaway",
  "plan": {
    "type": "count_by|avg_by|distribution|concern_frequency|cross_tab",
    "groupBy": "<column>",
    "valueCol": "<column or null>",
    "chartType": "bar|horizontal_bar|pie|donut|line",
    "filter": null or {"col":"<col>","op":"eq|gte|lte|contains","val":"<value>"}
  },
  "title": "chart title",
  "subtitle": "short subtitle"
}`;

  const raw = await callAI(
    system,
    `User question: "${question}"\n\nReturn the analysis plan JSON.`,
    1500
  );
  return parseJSON(raw);
}

    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();

      // Normalise then clean: remove declined calls and junk rows
      const rows = cleanData(
        rawRows
          .filter(r => Object.values(r).some(v => v !== null && v !== '' && v !== undefined))
          .map(normaliseRow)
      );
      setData(rows); setDataSource('upload');
      setProfile(null); setAdhocCharts([]); setChatHistory([]);
      doProfile(rows);
    };

    if (ext === 'csv') {
      Papa.parse(file, {
        header: true, skipEmptyLines: true, dynamicTyping: false,
        transformHeader: h => h.trim(),
        complete: (r) => loadRows(r.data)
      });
    } else if (ext === 'xlsx' || ext === 'xls') {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const XLSX = window.XLSX || window.SheetJS;
          if (!XLSX) { alert('SheetJS not loaded — please refresh'); return; }
          const wb = XLSX.read(e.target.result, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rawXlsx = XLSX.utils.sheet_to_json(ws, { defval: '' });
          // Trim whitespace from all keys (XLSX can have trailing spaces too)
          const raw = rawXlsx.map(row => {
            const clean = {};
            Object.keys(row).forEach(k => { clean[k.trim()] = row[k]; });
            return clean;
          });
          loadRows(raw);
        } catch(err) { alert('Could not parse Excel file: ' + err.message); }
      };
      reader.readAsArrayBuffer(file);
    } else if (ext === 'json') {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const parsed = JSON.parse(e.target.result);
          const raw = Array.isArray(parsed) ? parsed : parsed.data || Object.values(parsed)[0];
          loadRows(raw);
        } catch { alert('Invalid JSON'); }
      };
      reader.readAsText(file);
    } else {
      alert('Supported formats: .xlsx, .xls, .csv, .json');

          ? <span className="chip chip-lime"><span className="spin"></span>Profiling dataset…</span>
          : profile
            ? <span className="chip chip-lime">✦ AI Profiled</span>
            : null
        }
        {dataSource === 'live'
          ? <span className="chip chip-cyan">🔴 Live — {stats.n || 0} responses</span>
          : dataSource === 'upload'
            ? <span className="chip chip-cyan">📁 Uploaded — {stats.n || 0} rows</span>
            : <span className="chip chip-fog">🧪 Sample — {stats.n || 0} rows</span>
        }
        {dataSource === 'live' && (
          <button className="chip chip-fog" style={{cursor:'pointer',border:'1px solid rgba(255,255,255,.1)',fontFamily:'inherit'}}
            onClick={refreshLiveData}>
            ↻ Refresh
          </button>
        )}
        <button className="chip chip-fog" style={{cursor:'pointer',border:'1px solid rgba(255,255,255,.1)',fontFamily:'inherit'}}
          onClick={()=>fileRef.current.click()}>
          ↑ Upload Excel / CSV
        </button>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv,.json" style={{display:'none'}}
          onChange={e=>handleFile(e.target.files[0])}/>
        <a href="/client" style={{textDecoration:'none'}}>
          <span className="chip" style={{
            background:'linear-gradient(135deg,rgba(184,255,87,0.15),rgba(87,217,255,0.1))',
            color:'#b8ff57',border:'1px solid rgba(184,255,87,0.3)',cursor:'pointer',
          }}>
            🎙 Survey Agent →
          </span>
        </a>
        <img
          src="/static/M2T_LOGO.png"
          alt="Company Logo"
          className="company-logo"
          onError={e => e.target.style.display='none'}
        />
      </div>
    </div>

    <div className="shell">
      {/* ─── MAIN PANEL ─── */}
      <div className="main">

        {/* Tabs */}
        <div className="tabs">
          {['dashboard','analysis','data'].map(t=>(
            <button key={t} className={`tab${activeTab===t?' active':''}`}
              onClick={()=>setActiveTab(t)}>
              {t==='dashboard'?'📊 Dashboard':t==='analysis'?'🔍 AI Analysis':'🗂 Raw Data'}
            </button>
          ))}
        </div>

        {/* ── DASHBOARD TAB ── */}
        {activeTab==='dashboard' && (
          <>
          {/* Stat row */}
          <div className="stat-grid">
            {[
              {label:'Total Respondents',val:stats.n,sub:'survey entries',color:'#b8ff57',glow:'rgba(184,255,87,0.08)'},
              {label:'Avg Age',val:stats.avgAge,sub:'years old',color:'#57d9ff',glow:'rgba(87,217,255,0.08)'},
              {label:'Vote for Govt',val:`${stats.pctYes}%`,sub:`${stats.voteYes} of ${stats.n}`,color:'#a78bfa',glow:'rgba(167,139,250,0.08)'},
              {label:'Avg Satisfaction',val:stats.avgQ1,sub:'out of 5',color:'#ffb347',glow:'rgba(255,179,71,0.08)'},
              {label:'States Covered',val:stats.states,sub:'unique states',color:'#ff6b8a',glow:'rgba(255,107,138,0.08)'},
            ].map(s=>(
              <div key={s.label} className="stat-card" style={{'--glow-c':s.glow}}>
                <div className="stat-label">{s.label}</div>
                <div className="stat-val" style={{color:s.color}}>{s.val}</div>
                <div className="stat-sub">{s.sub}</div>
              </div>
            ))}
          </div>

          {/* AI summary */}
          {profile?.keySummary?.length > 0 && (
            <div className="card" style={{marginBottom:20}}>
              <div className="sec-hdr" style={{marginBottom:12}}>
                <div className="sec-title" style={{fontSize:13}}>
                  <span className="sec-title-dot" style={{background:'#a78bfa'}}></span>
                  AI Key Findings
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {profile.keySummary.map((s,i)=>(
                  <div key={i} style={{display:'flex',gap:10,fontSize:13,lineHeight:1.6,color:'#c4c4d8',padding:'8px 12px',background:'rgba(167,139,250,0.06)',borderRadius:8,border:'1px solid rgba(167,139,250,0.12)'}}>
                    <span style={{color:'#a78bfa',flexShrink:0}}>◆</span>
                    {s}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Suggested insight chips */}
          {profile?.suggestedInsights?.length > 0 && (
            <div style={{marginBottom:20}}>
              <div className="sec-hdr" style={{marginBottom:12}}>
                <div className="sec-title" style={{fontSize:13}}>
                  <span className="sec-title-dot" style={{background:'#b8ff57'}}></span>
                  Quick Insights — click to explore
                </div>
              </div>
              <div className="insight-list">
                {profile.suggestedInsights.slice(0,6).map((ins,i)=>(
                  <div key={i} className="insight-item"
                    onClick={()=>{sendChat(ins.question);}}>
                    <span className="insight-icon">{ins.icon||'📊'}</span>
                    <span>{ins.question}</span>
                    <span style={{marginLeft:'auto',color:'#b8ff57',fontSize:12}}>→</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Auto-generated charts from profile — only show when data is sufficient */}
          {profile?.suggestedInsights?.length > 0 && (() => {
            const eligibleCharts = profile.suggestedInsights.filter(ins =>
              data.length >= (ins.minRows || 5)
            );
            if (eligibleCharts.length === 0) return null;
            return (
              <>
              <div className="sec-hdr" style={{marginBottom:16}}>
                <div className="sec-title" style={{fontSize:13}}>
                  <span className="sec-title-dot" style={{background:'#57d9ff'}}></span>
                  Key Visualisations
                </div>
              </div>
              <div className="chart-grid">
                {eligibleCharts.slice(0,4).map((ins,i)=>(
                  <ChartRenderer key={i} plan={ins.plan} data={data} title={ins.title} subtitle={ins.subtitle}/>
                ))}
              </div>
              </>
            );
          })()}

          {profiling && (
            <div className="gen-indicator">
              <span className="spin"></span>
              AI is analysing your dataset and generating visualisations…
            </div>
          )}
          </>
        )}

        {/* ── ANALYSIS TAB ── */}
        {activeTab==='analysis' && (
          <>
          <div className="sec-hdr">
            <div className="sec-title" style={{fontSize:13}}>
              <span className="sec-title-dot" style={{background:'#57d9ff'}}></span>
              AI-Generated Analysis Charts
            </div>
            <span style={{fontSize:12,color:'#6b6b8a'}}>Ask questions in the chat to add charts →</span>
          </div>
          {adhocCharts.length === 0 ? (
            <div className="empty">
              <div className="empty-icon">🔍</div>
              <div className="empty-text">Ask a question in the chat panel to generate analysis charts.<br/>
              Try: <em>"Which state has the lowest satisfaction?"</em> or <em>"Show concern breakdown by gender"</em></div>
            </div>
          ) : (
            <div className="chart-grid">
              {adhocCharts.map(c=>(
                <ChartRenderer key={c.id} plan={c.plan} data={data} title={c.title} subtitle={c.subtitle}/>
              ))}
            </div>
          )}
          </>
        )}

        {/* ── RAW DATA TAB ── */}
        {activeTab==='data' && (
          <>
          <div style={{overflowX:'auto',border:'1px solid rgba(255,255,255,0.07)',borderRadius:12}}>
            <table className="data-table">
              <thead>
                <tr>{Object.keys(data[0]||{}).map(k=><th key={k}>{k}</th>)}</tr>
              </thead>
              <tbody>
                {data.slice(0,50).map((r,i)=>(
                  <tr key={i}>{Object.values(r).map((v,j)=><td key={j}>{String(v??'')}</td>)}</tr>
                ))}
              </tbody>
            </table>
          </div>
          {data.length>50 && <div style={{textAlign:'center',padding:'12px',fontSize:12,color:'#6b6b8a'}}>Showing 50 of {data.length} rows</div>}
          </>
        )}
      </div>

      {/* ─── CHAT SIDEBAR ─── */}
      <div className="sidebar">
        <div className="chat-panel">
          <div className="chat-hdr">
            <div className="chat-hdr-icon">🤖</div>
            <div>
              <div className="chat-hdr-text">Data Assistant</div>
              <div className="chat-hdr-sub">
                {profile ? 'Ready to answer questions' : 'Loading dataset profile…'}
              </div>
            </div>
          </div>

          <div className="chat-msgs">
            {chatHistory.length === 0 && (
              <div style={{padding:'16px 0',textAlign:'center',color:'#6b6b8a',fontSize:13,lineHeight:1.8}}>
                <div style={{fontSize:32,marginBottom:12}}>💬</div>
                Ask me anything about the survey data.<br/>
                I'll generate charts, compute statistics,<br/>
                and give you narrative insights.
              </div>
            )}
            {chatHistory.map((m,i)=>(
              <div key={i} className={`msg-bubble ${m.role}`}>
                <div className="bubble-content">
                  {m.text}
                  {m.facts && m.facts.length > 0 && (
                    <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:4}}>
                      {m.facts.map((f,j)=>(
                        <div key={j} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:'1px solid rgba(255,255,255,0.08)',fontSize:12}}>
                          <span style={{color:'#9494b0'}}>{f.label}</span>
                          <span style={{fontWeight:600,color:'#b8ff57'}}>{f.value}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  {m.chartRef && (
                    <div style={{marginTop:10,padding:'6px 10px',background:'rgba(87,217,255,0.08)',borderRadius:6,fontSize:11,color:'#57d9ff',cursor:'pointer'}}
                      onClick={()=>setActiveTab('analysis')}>
                      📊 Chart generated → {m.chartRef.title}
                    </div>
                  )}
                </div>
                {m.time && <div className="msg-time">{m.time}</div>}
              </div>
            ))}
            {chatLoading && (
              <div className="msg-bubble bot">
                <div className="bubble-content" style={{display:'flex',alignItems:'center',gap:8,color:'#6b6b8a'}}>
                  <span className="spin"></span> Analysing your question…
                </div>
              </div>
            )}
            <div ref={chatEndRef}/>
          </div>

          <div className="chat-input-area">
            <div className="chat-suggestions">
              {suggestions.map((s,i)=>(
                <button key={i} className="sugg-btn" onClick={()=>sendChat(s)}>{s}</button>
              ))}
            </div>
            <div className="chat-input-row">
              <input
                className="chat-input"
                value={chatInput}
                onChange={e=>setChatInput(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendChat(chatInput)}
                placeholder={profile ? "Ask about the data…" : "Profiling dataset…"}
                disabled={!profile||chatLoading}
              />
              <button className="send-btn"
                onClick={()=>sendChat(chatInput)}
                disabled={!profile||chatLoading||!chatInput.trim()}>
                ↑
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
